<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raspadinha do Bar da Boa</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:url("fundo.jpeg") center/cover no-repeat fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
padding:20px;
}

select,input,button{
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
margin:8px;
}

button{
background:#f1c40f;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(4,120px);
gap:15px;
justify-content:center;
margin-top:30px;
}

.card{
width:120px;
height:120px;
border-radius:10px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
position:relative;
overflow:hidden;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Raspadinha do Bar da Boa</h1>

<p>A cada R$25 em consumo você ganha uma raspadinha</p>

<select id="valor">
<option value="1">25,00 - 1 raspadinha</option>
<option value="2">50,00 - 2 raspadinhas</option>
<option value="3">75,00 - 3 raspadinhas</option>
<option value="4">100,00 - 4 raspadinhas</option>
<option value="5">125,00 - 5 raspadinhas</option>
<option value="6">150,00 - 6 raspadinhas</option>
</select>

<br>

<input id="senha" type="password" placeholder="Senha do atendente">

<button onclick="liberar()">Liberar raspadinhas</button>

<div id="mensagem"></div>

<div id="jogo" class="grid"></div>

</div>

<script>

function liberar(){

let senha=document.getElementById("senha").value

if(senha!="221430"){
alert("Senha incorreta")
return
}

let limite=parseInt(document.getElementById("valor").value)

let premios=[
"Vale 1 cerveja",
"Vale 1 energético",
"Vale 1 dose",
"Vale 1 copão",
"Vale 1 cerveja",
"Vale 1 energético",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou"
]

premios.sort(()=>Math.random()-0.5)

let jogo=document.getElementById("jogo")

jogo.innerHTML=""

for(let i=0;i<12;i++){

let card=document.createElement("div")
card.className="card"
card.innerHTML=premios[i]

jogo.appendChild(card)

}

document.getElementById("mensagem").innerHTML="Raspe até "+limite+" raspadinhas."

}

</script>

</body>
</html>
