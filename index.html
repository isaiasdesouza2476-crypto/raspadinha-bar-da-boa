<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raspadinha do Bar da Boa</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:url("fundo.jpeg") center/cover no-repeat fixed;
color:white;
overflow:hidden;
touch-action:none;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
padding:20px;
}

select,input,button{
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
margin:8px;
}

button{
background:#f1c40f;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(4,120px);
gap:15px;
justify-content:center;
margin-top:30px;
}

.card{
width:120px;
height:120px;
border-radius:10px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
position:relative;
overflow:hidden;
}

.premio{
position:absolute;
z-index:1;
text-align:center;
padding:6px;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:2;
touch-action:none;
}

/* POPUP ANIMADO */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
background:rgba(0,0,0,0.9);
padding:25px 40px;
border-radius:15px;
font-size:30px;
font-weight:bold;
z-index:999;
opacity:0;
transition:0.25s;
}

#popup.show{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

.ganhou{
color:#2ecc71;
}

.perdeu{
color:#e74c3c;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Raspadinha do Bar da Boa</h1>

<p>A cada R$25 em consumo você ganha uma raspadinha</p>

<select id="valor">
<option value="1">25,00 - 1 raspadinha</option>
<option value="2">50,00 - 2 raspadinhas</option>
<option value="3">75,00 - 3 raspadinhas</option>
<option value="4">100,00 - 4 raspadinhas</option>
<option value="5">125,00 - 5 raspadinhas</option>
<option value="6">150,00 - 6 raspadinhas</option>
</select>

<br>

<input id="senha" type="password" placeholder="Senha do atendente">

<button onclick="liberar()">Liberar raspadinhas</button>

<div id="jogo" class="grid"></div>

</div>

<div id="popup"></div>

<script>

let raspadas=0
let limite=0

function mostrarMensagem(texto,classe){

let popup=document.getElementById("popup")

popup.className=classe
popup.innerHTML=texto

popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},1500)

}

function liberar(){

let senha=document.getElementById("senha").value

if(senha!="221430"){
alert("Senha incorreta")
return
}

raspadas=0
limite=parseInt(document.getElementById("valor").value)

let premios=[
"Vale 1 cerveja",
"Vale 1 energético",
"Vale 1 dose",
"Vale 1 copão",
"Vale 1 cerveja",
"Vale 1 energético",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou"
]

premios.sort(()=>Math.random()-0.5)

let jogo=document.getElementById("jogo")
jogo.innerHTML=""

for(let i=0;i<12;i++){

let card=document.createElement("div")
card.className="card"

let texto=document.createElement("div")
texto.className="premio"
texto.innerHTML=premios[i]

card.appendChild(texto)

let canvas=document.createElement("canvas")
canvas.width=120
canvas.height=120

card.appendChild(canvas)

jogo.appendChild(card)

let ctx=canvas.getContext("2d")

ctx.fillStyle="#FFD700"
ctx.fillRect(0,0,120,120)

ctx.globalCompositeOperation="destination-out"

let raspando=false

canvas.addEventListener("pointerdown",()=>{
if(raspadas>=limite) return
raspando=true
})

canvas.addEventListener("pointerup",()=>{

raspando=false

if(canvas.revelado) return
if(raspadas>=limite) return

canvas.revelado=true
raspadas++

let premio=texto.innerHTML

if(premio==="Não ganhou"){
mostrarMensagem("❌ Não foi dessa vez!","perdeu")
}else{
mostrarMensagem("🎉 Parabéns! Você ganhou: "+premio,"ganhou")
}

})

canvas.addEventListener("pointermove",(e)=>{

if(!raspando) return
if(raspadas>=limite) return

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

ctx.beginPath()
ctx.arc(x,y,25,0,Math.PI*2)
ctx.fill()

})

}

}

</script>

</body>
</html>
