<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Raspadinha do Bar da Boa</title>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
background:url("fundo.jpeg") center/cover no-repeat fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

.logo{
width:200px;
}

select,input,button{
padding:10px;
font-size:18px;
margin:10px;
border-radius:8px;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(4,120px);
gap:15px;
justify-content:center;
margin-top:30px;
}

.card{
width:120px;
height:120px;
background:silver;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:10px;
font-weight:bold;
}

.raspada{
background:white;
color:black;
}

</style>
</head>

<body>

<div class="overlay">

<img src="logo.png" class="logo">

<h1>Raspadinha do Bar da Boa</h1>

<p>A cada R$25 em consumo você ganha uma raspadinha</p>

<select id="valor">
<option value="1">25,00 - 1 raspadinha</option>
<option value="2">50,00 - 2 raspadinhas</option>
<option value="3">75,00 - 3 raspadinhas</option>
<option value="4">100,00 - 4 raspadinhas</option>
</select>

<br>

<input id="senha" type="password" placeholder="Senha">

<button onclick="liberar()">Liberar raspadinhas</button>

<div id="jogo" class="grid"></div>

</div>

<script>

function liberar(){

var senha=document.getElementById("senha").value

if(senha!="221430"){

alert("Senha incorreta")

return

}

var qtd=parseInt(document.getElementById("valor").value)

var premios=[

"Vale 1 cerveja",
"Vale 1 energético",
"Vale 1 dose",
"Vale 1 copão",
"Vale 1 cerveja",
"Vale 1 energético",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou",
"Não ganhou"

]

premios.sort(()=>Math.random()-0.5)

var jogo=document.getElementById("jogo")

jogo.innerHTML=""

for(var i=0;i<qtd;i++){

var carta=document.createElement("div")

carta.className="card"

carta.innerHTML="RASPAR"

carta.dataset.resultado=premios[i]

carta.onclick=function(){

if(this.classList.contains("raspada")) return

this.classList.add("raspada")

if(this.dataset.resultado=="Não ganhou"){

this.innerHTML="❌ Não foi dessa vez"

}else{

this.innerHTML="🎉 "+this.dataset.resultado

}

}

jogo.appendChild(carta)

}

}

</script>

</body>
</html>
